<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Boutique - Mi Perfil</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="../../CSS/vistas cliente css/perfil.css">
</head>
<body>
    <div class="menu-lateral">
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo-content">
                    <img src="../../Image/logoGraper.jpeg" alt="Bella Boutique" class="logo-img">
                    <div class="logo-text">
                        <div style="font-size: 1.5rem; font-weight: 700; line-height: 1; color: white;">Graper</div>
                        
                    </div>
                </div>
            </div>
            <ul class="nav-links">
                <li><a href="./inicio.html"><span class="material-symbols-outlined">home</span><span class="link-name">Inicio</span></a></li>
                <li><a href="./productos.html"><span class="material-symbols-outlined">checkroom</span><span class="link-name">Productos</span></a></li>
                <li><a href="./favoritos.html"><span class="material-symbols-outlined">favorite</span><span class="link-name">Favoritos</span></a></li>
                <li><a href="./apartados.html"><span class="material-symbols-outlined">assignment</span><span class="link-name">Mis Apartados</span></a></li>
                <li><a href="./compras.html"><span class="material-symbols-outlined">package_2</span><span class="link-name">Mis Compras</span></a></li>
                <li><a href="./perfil.html" class="active"><span class="material-symbols-outlined">person</span><span class="link-name">Mi Perfil</span></a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="./cerrar-sesion.html" class="logout-link">
                    <span class="material-symbols-outlined">logout</span>
                    <span class="link-name">Cerrar Sesión</span>
                </a>
            </div>
        </nav>
        <main class="main-content">
            <header class="top-header">
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="search-bar-top">
                    <span class="material-symbols-outlined">search</span>
                    <input type="text" id="search-input" placeholder="Buscar..." maxlength="100">
                </div>
                <div class="user-profile-display">
                    <div class="avatar-placeholder">AL</div>
                    <div class="user-info"><span class="user-name">Ana López</span></div>
                </div>
            </header>
            <div class="content-body">
                <div class="page-header">
                    <h1 class="main-title">Mi Perfil</h1>
                    <p class="subtitle">Administra tu información personal.</p>
                </div>
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar">AL</div>
                        <div class="profile-name-section">
                            <h2 id="profile-display-name">Ana López</h2>
                        </div>
                        <button class="btn-edit-profile" id="btn-edit">Editar Perfil</button>
                    </div>
                    <div class="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="input-nombre">Nombre completo</label>
                                <input type="text" id="input-nombre" value="Ana López" disabled>
                            </div>
                            <div class="form-group">
                                <label for="input-email">Correo electrónico</label>
                                <input type="email" id="input-email" value="ana.lopez@correo.com" disabled>
                            </div>
                        </div>
                    </div>
                    <div class="profile-actions" id="profile-actions" style="display: none;">
                        <button class="btn-save" id="btn-save">Guardar Cambios</button>
                        <button class="btn-cancel" id="btn-cancel">Cancelar</button>
                    </div>
                </div>
                <div class="profile-card" style="margin-top: 1.5rem;">
                    <h2 style="font-size: 1.25rem; color: #0f172a; margin-bottom: 1rem;">Seguridad</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="input-password-actual">Contraseña actual</label>
                            <div class="password-wrapper">
                                <input type="password" id="input-password-actual" placeholder="••••••••" disabled>
                                <button type="button" class="btn-toggle-pass" onclick="togglePassword('input-password-actual', this)" tabindex="-1">
                                    <span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
                                </button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="input-password-nueva">Nueva contraseña</label>
                            <div class="password-wrapper">
                                <input type="password" id="input-password-nueva" placeholder="••••••••" disabled>
                                <button type="button" class="btn-toggle-pass" onclick="togglePassword('input-password-nueva', this)" tabindex="-1">
                                    <span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="profile-actions" id="password-actions" style="display: none;">
                        <button class="btn-save" id="btn-save-password">Guardar Contraseña</button>
                        <button class="btn-cancel" id="btn-cancel-password">Cancelar</button>
                    </div>
                    <div style="margin-top: 1rem;">
                        <button class="btn-edit-profile" id="btn-edit-password">Cambiar Contraseña</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../../JavaScrip/api-config.js"></script>
    <script src="../../JavaScrip/vistas cliente js/perfil.js"></script>
</body>
</html>
