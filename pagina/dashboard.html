<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graper - Dashboard</title>
    <link rel="stylesheet" href="../CSS/dashboard.css">
</head>
<body>
    <aside class="Menu-Lateral">
      <div class="logo">
        <img src="../Image/logotipo.jpg" alt="Logo Graper">
            <h1>GRAPER</h1>
        </div>
        <ul>
            <li><a href="#"><img src="../Image/inicio.png" alt="Inicio">Inicio</a></li>
            <li><a href="#"><img src="../Image/productos.png" alt="Productos">Productos</a></li>
            <li><a href="#"><img src="../Image/ventas.png" alt="Ventas">Ventas</a></li>
            <li><a href="#"><img src="../Image/cliente.png" alt="Clientes">Clientes</a></li>
            <li><a href="#"><img src="../Image/inventario.png" alt="Inventario">Inventario</a></li>
            <li><a href="#"><img src="../Image/categoria.png" alt="Categorías">Categorías</a></li>
            <li><a href="#"><img src="../Image/descuento.png" alt="Descuentos">Descuentos</a></li>
            <li><a href="#"><img src="../Image/estadisticas.png" alt="Estadísticas">Estadísticas</a></li>
        </ul>
        <div class="cerrar">
            <a href="#"><img src="/Image/cerrarSesion.png" alt="Cerrar sesión">Cerrar sesión</a>
        </div>
    </aside>
    <main>

    <header>
        <div class="menu-superior">
            <button type="button">☰</button>
                <div class="lado-derecho">
                    <div class="buscador">
                    <img src="../Image/buscador.png" alt="Buscar">
                    <input type="search" placeholder="Buscar...">
                    </div>
                    <div class="administrador">
                        <img src="../Image/perfil.png" alt="Administrador">
                        <span>Administrador</span>
                    </div>
                </div>
            </div>
    </header>
    <section class="inicio">

    <h1>Inicio</h1>

    <p>Bienvenido, Administrador 👋</p>

    <div class="tarjetas">

        <div class="tarjeta">

            <div class="icono">
                <img src="../Image/ventas.png" alt="Ventas">
            </div>

            <div class="informacion">
                <h3>Ventas del día</h3>
                <h2>$12,450.00</h2>
                <p>+12% vs ayer</p>
            </div>
        </div>
    </div>
</section>
</main>
</body>
</html>
