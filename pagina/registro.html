<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graper - Crear Cuenta</title>
    <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>

    <div class="back-container">
        <a href="../index.html" class="btn-back">⬅️ Volver al Login</a>
    </div>

    <div class="login-container">
        <div class="login-box">
            
            <div class="logo">
                <img src="../Image/logo.jpeg" alt="Logo Bella Boutique" class="form-logo">
                <h2>GRAPER</h2>
                <p>Crear Nueva Cuenta</p>
            </div>
            
            <form id="registerForm">
                <div class="input-group">
                    <label for="reg-name">Nombre Completo</label>
                    <input type="text" id="reg-name" placeholder="Tu nombre" required>
                </div>

                <div class="input-group">
                    <label for="reg-email">Correo Electrónico</label>
                    <input type="email" id="reg-email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="reg-password">Contraseña</label>
                    <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" required>
                </div>

                <button type="submit" class="btn-login">Registrarse</button>
            </form>

            <div class="register-link">
                <p>¿Ya tienes cuenta? <a href="../index.html">Inicia sesión aquí</a></p>
            </div>

        </div>
    </div>
</body>
</html>
