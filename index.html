<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graper - Iniciar Sesión</title>
    <link rel="stylesheet" href="../CSS/styles.css"> 
</head>
<body>
    <div class="login-container">
        <div class="login-box">
  
            <div class="logo">
                <img src="../Image/logo.jpeg" alt="Logo Bella Boutique" class="form-logo">
                <h2>GRAPER</h2>
                <p>Boutique Exclusiva</p>
            </div>

            <form id="loginForm">
                
                <div class="role-selection">
                    <p class="role-title">Selecciona tu perfil</p>
                    <div class="role-options">
                        <label class="role-btn">
                            <input type="radio" name="rol" value="administrador" checked>
                            <span>Admin</span>
                        </label>
                        <label class="role-btn">
                            <input type="radio" name="rol" value="cliente">
                            <span>Cliente</span>
                        </label>
                        <label class="role-btn">
                            <input type="radio" name="rol" value="empleado">
                            <span>Empleado</span>
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="options">
                    <a href="#">¿Olvidaste tu contraseña?</a>
                </div>
                
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
            
            <div class="register-link">
                <p>¿No tienes cuenta? <a href="pagina/registro.html">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</body>
</html>
