<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graper - Iniciar Sesión</title>
    <link rel="stylesheet" href="CSS/shared.css">
    <link rel="stylesheet" href="./CSS/styles.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="./JavaScrip/api-config.js"></script>
    <script src="./JavaScrip/login.js"></script>
</head>
<body>

    <div class="login-container">
        <div class="login-box">

            <div class="logo">
                <img src="./Image/logo.jpeg" alt="Logo Boutique" class="form-logo">
                <h2>GRAPER</h2>
                <p>Boutique</p>
            </div>

            <form id="miFormulario">

                <div class="input-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="Ingresa tu usuario" required>
                </div>

                <div class="input-group">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingresa tu contraseña" required>
                </div>

                <div id="respuesta" class="respuesta-msg"></div>

                <button type="submit" class="btn-login">Iniciar Sesión</button>

            </form>

            <div class="register-link">
                <p>¿No tienes cuenta? <a href="./pagina/registro.html">Regístrate aquí</a></p>
            </div>

        </div>
    </div>

</body>
</html>
